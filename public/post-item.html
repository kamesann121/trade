<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameTrade - 出品する</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="/home.html" class="logo">🎮 GameTrade</a>
      <nav class="header-right">
        <button class="menu-btn" id="menuBtn">☰</button>
      </nav>
    </div>
  </header>
  <div class="overlay" id="overlay"></div>
  <aside class="side-menu" id="sideMenu">
    <ul>
      <li><a href="/home.html">🏠 ホーム</a></li>
      <li><a href="/post-item.html">➕ 出品する</a></li>
      <li><a href="/my-exchanges.html">🔄 交換管理</a></li>
      <li><a href="/messages.html">💬 メッセージ</a></li>
      <li><a href="/notifications.html">🔔 通知</a></li>
      <li><a href="/profile.html">👤 プロフィール</a></li>
      <li><a href="#" onclick="logout()">🚪 ログアウト</a></li>
    </ul>
  </aside>

  <main class="form-page">
    <h1 class="page-title">➕ アイテムを出品する</h1>

    <div class="post-form card">
      <!-- 画像 -->
      <div class="form-group">
        <label>画像（最大5枚・各5MBまで）</label>
        <div class="image-upload-area" onclick="document.getElementById('imageInput').click()">
          <span>📷 クリックして画像を追加</span>
        </div>
        <input type="file" id="imageInput" accept="image/*" multiple style="display:none"
          onchange="previewImages(event)">
        <div class="image-preview-list" id="imagePreviewList"></div>
      </div>

      <!-- タイトル -->
      <div class="form-group">
        <label>アイテム名 <span class="required">*</span></label>
        <input type="text" id="title" placeholder="例：レジェンドスキン　スターウォーズ">
      </div>

      <!-- 説明（#タグ対応） -->
      <div class="form-group">
        <label>説明・#タグ</label>
        <textarea id="description" rows="5"
          placeholder="説明を書いてください。&#10;#タグをつけると検索されやすくなります。&#10;&#10;例：&#10;レアスキンです。交換希望！&#10;#フォートナイト #スキン #レジェンド"></textarea>
        <div class="hint" style="margin-top:6px">💡 #タグをつけると検索でヒットしやすくなります</div>
        <div class="tag-preview" id="tagPreview"></div>
      </div>

      <!-- 求めるもの -->
      <div class="form-group">
        <label>🔄 求めるアイテム名</label>
        <input type="text" id="wantTitle" placeholder="例：バトルパス、Vバックスなど">
      </div>

      <div class="error-msg" id="postError"></div>
      <button class="btn-primary" onclick="postItem()">出品する</button>
    </div>
  </main>

  <script src="/js/auth.js"></script>
  <script src="/js/items.js"></script>
  <script>
    // タグプレビュー
    document.getElementById('description')?.addEventListener('input', function() {
      const matches = this.value.match(/#[\w\u3040-\u9fff]+/g) || [];
      const preview = document.getElementById('tagPreview');
      preview.innerHTML = matches.map(t =>
        `<span class="tag">${t}</span>`
      ).join('');
    });
  </script>
</body>
</html>
