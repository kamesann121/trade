<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameTrade - メッセージ</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="/home.html" class="logo">🎮 GameTrade</a>
      <nav class="header-right">
        <span class="notif-icon" onclick="location.href='/notifications.html'" style="cursor:pointer">🔔
          <span class="notif-badge" id="notifBadge" style="display:none">0</span>
        </span>
        <button class="menu-btn" id="menuBtn">☰</button>
      </nav>
    </div>
  </header>
  <div class="overlay" id="overlay"></div>
  <aside class="side-menu" id="sideMenu">
    <ul>
      <li><a href="/home.html">🏠 ホーム</a></li>
      <li><a href="/post-item.html">➕ 出品する</a></li>
      <li><a href="/my-exchanges.html">🔄 交換管理</a></li>
      <li><a href="/messages.html">💬 メッセージ</a></li>
      <li><a href="/notifications.html">🔔 通知</a></li>
      <li><a href="/profile.html">👤 プロフィール</a></li>
      <li><a href="/settings.html">⚙️ 設定</a></li>
      <li><a href="/report.html">🚨 通報</a></li>
      <li><a href="#" onclick="logout()">🚪 ログアウト</a></li>
    </ul>
  </aside>

  <div class="dm-layout">
    <!-- 左：会話一覧 -->
    <aside class="conv-list" id="convList">
      <div class="conv-list-header">💬 メッセージ</div>
      <div id="convListInner"><div class="loading">読み込み中…</div></div>
    </aside>

    <!-- 右：チャット画面 -->
    <section class="chat-area" id="chatArea">
      <div class="chat-placeholder">
        <span>👈 会話を選んでください</span>
      </div>
    </section>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/messages.js"></script>
</body>
</html>
