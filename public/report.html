<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameTrade - 通報</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    .report-page { max-width: 560px; margin: 0 auto; padding: 24px 16px; }
    .report-title { font-size: 20px; font-weight: 900; margin-bottom: 20px; }
    .search-result-list { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
    .search-result-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px; background: var(--card);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; transition: border-color 0.2s;
    }
    .search-result-item:hover { border-color: var(--accent); }
    .search-result-item.selected { border-color: var(--accent); background: rgba(124,92,252,0.06); }
    .result-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--accent); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; flex-shrink: 0; overflow: hidden;
    }
    .result-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .reason-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .reason-item {
      padding: 12px 16px; border: 1.5px solid var(--border);
      border-radius: 10px; cursor: pointer; font-size: 14px;
      transition: all 0.2s; background: var(--card);
    }
    .reason-item:hover { border-color: var(--accent); }
    .reason-item.selected { border-color: var(--accent); background: rgba(124,92,252,0.06); font-weight: 700; }
    .selected-user-card {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; background: rgba(124,92,252,0.06);
      border: 1.5px solid var(--accent); border-radius: 10px; margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="/home.html" class="logo">🎮 GameTrade</a>
      <nav class="header-right">
        <button class="menu-btn" id="menuBtn">☰</button>
      </nav>
    </div>
  </header>
  <div class="overlay" id="overlay"></div>
  <aside class="side-menu" id="sideMenu">
    <ul>
      <li><a href="/home.html">🏠 ホーム</a></li>
      <li><a href="/post-item.html">➕ 出品する</a></li>
      <li><a href="/my-exchanges.html">🔄 交換管理</a></li>
      <li><a href="/messages.html">💬 メッセージ</a></li>
      <li><a href="/notifications.html">🔔 通知</a></li>
      <li><a href="/profile.html">👤 プロフィール</a></li>
      <li><a href="/settings.html">⚙️ 設定</a></li>
      <li><a href="/report.html">🚨 通報</a></li>
      <li><a href="#" onclick="logout()">🚪 ログアウト</a></li>
    </ul>
  </aside>

  <main class="report-page">
    <div class="report-title">🚨 ユーザーを通報する</div>

    <!-- ステップ1：ユーザー検索 -->
    <div id="step1">
      <div class="section-label" style="font-size:14px;font-weight:700;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--border)">
        STEP 1　通報するユーザーを検索
      </div>

      <!-- URLパラメータで自動セットされる場合 -->
      <div id="presetUser" style="display:none">
        <div class="selected-user-card" id="presetCard"></div>
      </div>

      <div id="searchArea">
        <div class="form-group">
          <label>ユーザー名で検索</label>
          <div style="display:flex;gap:8px">
            <input type="text" id="searchInput" placeholder="ニックネームを入力"
              onkeydown="if(event.key==='Enter')searchUser()">
            <button class="btn-sm btn-accent" style="padding:10px 16px" onclick="searchUser()">検索</button>
          </div>
        </div>
        <div class="search-result-list" id="searchResults"></div>
      </div>
    </div>

    <!-- ステップ2：理由選択 -->
    <div id="step2" style="display:none;margin-top:24px">
      <div class="section-label" style="font-size:14px;font-weight:700;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--border)">
        STEP 2　通報理由を選択
      </div>
      <div class="reason-list">
        <div class="reason-item" onclick="selectReason(this,'詐欺・虚偽の出品')">🚫 詐欺・虚偽の出品</div>
        <div class="reason-item" onclick="selectReason(this,'嫌がらせ・ハラスメント')">😡 嫌がらせ・ハラスメント</div>
        <div class="reason-item" onclick="selectReason(this,'改造品・違法品の出品')">⚠️ 改造品・違法品の出品</div>
        <div class="reason-item" onclick="selectReason(this,'スパム・迷惑行為')">📢 スパム・迷惑行為</div>
        <div class="reason-item" onclick="selectReason(this,'その他')">📝 その他</div>
      </div>

      <div class="form-group">
        <label>詳細（任意）</label>
        <textarea id="reportDetail" rows="3" style="width:100%;padding:10px 14px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;resize:none;font-family:inherit;outline:none;" placeholder="具体的な状況を教えてください"></textarea>
      </div>

      <div class="error-msg" id="reportError"></div>
      <button class="btn-primary" onclick="submitReport()">通報する</button>
      <button class="btn-sm btn-outline" style="width:100%;padding:12px;margin-top:10px" onclick="resetStep()">戻る</button>
    </div>
  </main>

  <script src="/js/auth.js"></script>
  <script>
    const token      = () => localStorage.getItem('gt_token');
    const authHeader = () => ({ Authorization: `Bearer ${token()}` });

    let selectedUserId   = null;
    let selectedUsername = '';
    let selectedReason   = '';

    // ── デバイスフィンガープリント生成 ────────
    function getFingerprint() {
      const data = [
        navigator.userAgent,
        navigator.language,
        screen.width + 'x' + screen.height,
        screen.colorDepth,
        new Date().getTimezoneOffset(),
        navigator.hardwareConcurrency || '',
        navigator.platform || ''
      ].join('|');
      // 簡易ハッシュ
      let hash = 0;
      for (let i = 0; i < data.length; i++) {
        hash = ((hash << 5) - hash) + data.charCodeAt(i);
        hash |= 0;
      }
      return Math.abs(hash).toString(36);
    }

    // ── URLパラメータで自動セット ─────────────
    const params = new URLSearchParams(location.search);
    const presetId   = params.get('id');
    const presetName = params.get('name') || '';

    if (presetId) {
      selectedUserId   = presetId;
      selectedUsername = presetName;
      document.getElementById('presetUser').style.display = '';
      document.getElementById('searchArea').style.display = 'none';
      document.getElementById('presetCard').innerHTML = `
        <div style="font-size:24px">👤</div>
        <div><div style="font-weight:700">${presetName}</div><div style="font-size:12px;color:var(--text-sub)">通報対象として選択済み</div></div>`;
      document.getElementById('step2').style.display = '';
    }

    // ── ユーザー検索 ──────────────────────────
    async function searchUser() {
      const q = document.getElementById('searchInput').value.trim();
      if (!q) return;
      const res   = await fetch(`/api/reports/search?username=${encodeURIComponent(q)}`, { headers: authHeader() });
      const users = await res.json();
      const list  = document.getElementById('searchResults');
      if (!users.length) {
        list.innerHTML = '<div style="color:var(--text-sub);font-size:13px;padding:8px">見つかりませんでした</div>';
        return;
      }
      list.innerHTML = users.map(u => `
        <div class="search-result-item" id="result-${u._id}" onclick="selectUser('${u._id}','${u.username}')">
          <div class="result-avatar">${u.avatar ? `<img src="${u.avatar}">` : u.username[0].toUpperCase()}</div>
          <div>${u.username}</div>
        </div>`).join('');
    }

    function selectUser(id, name) {
      document.querySelectorAll('.search-result-item').forEach(el => el.classList.remove('selected'));
      document.getElementById(`result-${id}`)?.classList.add('selected');
      selectedUserId   = id;
      selectedUsername = name;
      document.getElementById('step2').style.display = '';
      document.getElementById('step2').scrollIntoView({ behavior: 'smooth' });
    }

    function selectReason(el, reason) {
      document.querySelectorAll('.reason-item').forEach(r => r.classList.remove('selected'));
      el.classList.add('selected');
      selectedReason = reason;
    }

    function resetStep() {
      document.getElementById('step2').style.display = 'none';
      selectedUserId = null;
      selectedReason = '';
      document.querySelectorAll('.search-result-item').forEach(el => el.classList.remove('selected'));
      document.querySelectorAll('.reason-item').forEach(el => el.classList.remove('selected'));
    }

    // ── 通報送信 ──────────────────────────────
    async function submitReport() {
      const errEl = document.getElementById('reportError');
      errEl.textContent = '';
      if (!selectedUserId) { errEl.textContent = '通報するユーザーを選んでください'; return; }
      if (!selectedReason) { errEl.textContent = '通報理由を選んでください'; return; }

      const detail      = document.getElementById('reportDetail').value.trim();
      const fingerprint = getFingerprint();

      try {
        const res  = await fetch('/api/reports', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...authHeader() },
          body: JSON.stringify({ reportedId: selectedUserId, reason: selectedReason, detail, fingerprint })
        });
        const data = await res.json();
        if (!res.ok) { errEl.textContent = data.message || '通報に失敗しました'; return; }
        alert('✅ 通報を受け付けました。ご協力ありがとうございます。');
        location.href = '/home.html';
      } catch {
        errEl.textContent = '通信エラーが発生しました';
      }
    }
  </script>
</body>
</html>
