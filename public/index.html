<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameTrade - ゲーム交換サイト</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body class="auth-page">

  <header class="header">
    <div class="header-inner">
      <div class="logo">🎮 GameTrade</div>
      <nav class="header-right">
        <span class="notif-icon" title="通知">🔔</span>
        <button class="menu-btn" id="menuBtn">☰</button>
      </nav>
    </div>
  </header>

  <div class="overlay" id="overlay"></div>
  <aside class="side-menu" id="sideMenu">
    <ul>
      <li><a href="/index.html">🏠 トップ</a></li>
      <li><a href="/home.html">🔍 アイテムを探す</a></li>
      <li id="menuLogin"><a href="#loginSection">🔑 ログイン</a></li>
      <li id="menuRegister"><a href="#loginSection">📝 新規登録</a></li>
    </ul>
  </aside>

  <main class="main-auth">
    <section class="notice-box">
      <h2>⚠️ ご利用前に必ずお読みください</h2>
      <ul>
        <li>本サイトはゲームソフト・カード・グッズなどの<strong>個人間交換</strong>を仲介するサービスです。</li>
        <li>金銭のやり取りは一切介在しません。交換はあくまで当事者間の合意に基づきます。</li>
        <li>違法コピー品・改造品・偽物の出品は<strong>厳禁</strong>です。発覚した場合は即時アカウント停止となります。</li>
        <li>トラブルが発生した場合、当サイトは責任を負いかねます。交換前に十分な確認をお願いします。</li>
        <li>18歳未満の方はご利用いただけません。</li>
      </ul>
    </section>

    <section class="auth-box" id="loginSection">
      <div class="tab-switch">
        <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">ログイン</button>
        <button class="tab-btn" id="tabRegister" onclick="switchTab('register')">新規登録</button>
      </div>

      <div id="loginForm">
        <div class="form-group">
          <label>メールアドレス</label>
          <input type="email" id="loginEmail" placeholder="example@mail.com">
        </div>
        <div class="form-group">
          <label>パスワード</label>
          <input type="password" id="loginPassword" placeholder="••••••">
        </div>
        <div class="error-msg" id="loginError"></div>
        <button class="btn-primary" onclick="login()">ログイン</button>
        <div class="divider">または</div>
        <button class="btn-google" onclick="loginWithGoogle()">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
          Googleでログイン
        </button>
      </div>

      <div id="registerForm" style="display:none">
        <div class="form-group">
          <label>ユーザー名</label>
          <input type="text" id="regUsername" placeholder="ニックネーム">
        </div>
        <div class="form-group">
          <label>メールアドレス</label>
          <input type="email" id="regEmail" placeholder="example@mail.com">
        </div>
        <div class="form-group">
          <label>パスワード（6文字以上）</label>
          <input type="password" id="regPassword" placeholder="••••••">
        </div>
        <div class="error-msg" id="registerError"></div>
        <button class="btn-primary" onclick="register()">登録する</button>
        <div class="divider">または</div>
        <button class="btn-google" onclick="loginWithGoogle()">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
          Googleで登録
        </button>
      </div>
    </section>
  </main>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey:       "AIzaSyDdarTdLYK_KkzRlzayLUBoPhdzKMiWm2Y",
      authDomain:   "game-exchange-de644.firebaseapp.com",
      projectId:    "game-exchange-de644",
      appId:        "1:801591509362:web:fb8fa007afbc2a86e21deb"
    };

    const app      = initializeApp(firebaseConfig);
    const auth     = getAuth(app);
    const provider = new GoogleAuthProvider();

    async function sendToBackend(idToken) {
      const res  = await fetch('/api/auth/firebase', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ idToken })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message);
      localStorage.setItem('gt_token', data.token);
      location.href = '/home.html';
    }

    window.loginWithGoogle = async () => {
      try {
        const result  = await signInWithPopup(auth, provider);
        const idToken = await result.user.getIdToken();
        await sendToBackend(idToken);
      } catch (err) {
        document.getElementById('loginError').textContent = err.message;
      }
    };

    window.login = async () => {
      const email    = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const errEl    = document.getElementById('loginError');
      errEl.textContent = '';
      if (!email || !password) { errEl.textContent = '全て入力してください'; return; }
      try {
        const res  = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) { errEl.textContent = data.message || 'ログイン失敗'; return; }
        localStorage.setItem('gt_token', data.token);
        location.href = '/home.html';
      } catch { errEl.textContent = '通信エラー'; }
    };

    window.register = async () => {
      const username = document.getElementById('regUsername').value.trim();
      const email    = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      const errEl    = document.getElementById('registerError');
      errEl.textContent = '';
      if (!username || !email || !password) { errEl.textContent = '全て入力してください'; return; }
      try {
        const res  = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password })
        });
        const data = await res.json();
        if (!res.ok) { errEl.textContent = data.message || data.errors?.[0]?.msg || '登録失敗'; return; }
        localStorage.setItem('gt_token', data.token);
        location.href = '/home.html';
      } catch { errEl.textContent = '通信エラー'; }
    };

    window.switchTab = (tab) => {
      const isLogin = tab === 'login';
      document.getElementById('loginForm').style.display    = isLogin ? '' : 'none';
      document.getElementById('registerForm').style.display = isLogin ? 'none' : '';
      document.getElementById('tabLogin').classList.toggle('active', isLogin);
      document.getElementById('tabRegister').classList.toggle('active', !isLogin);
    };

    // ログイン済みならhome.htmlへ
    if (localStorage.getItem('gt_token')) location.href = '/home.html';
  </script>

  <script src="/js/auth.js"></script>
</body>
</html>
