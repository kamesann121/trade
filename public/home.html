<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameTrade - ホーム</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="/home.html" class="logo">🎮 GameTrade</a>
      <div class="search-bar">
        <input type="text" id="searchInput"
          placeholder="アイテム名 または #タグで検索…"
          onkeydown="if(event.key==='Enter')searchItems()">
        <button class="btn-sm btn-accent" onclick="searchItems()">検索</button>
      </div>
      <nav class="header-right">
        <span class="notif-icon" onclick="location.href='/notifications.html'"
          style="cursor:pointer">🔔
          <span class="notif-badge" id="notifBadge" style="display:none">0</span>
        </span>
        <button class="menu-btn" id="menuBtn">☰</button>
      </nav>
    </div>
  </header>

  <div class="overlay" id="overlay"></div>
  <aside class="side-menu" id="sideMenu">
    <ul>
      <li><a href="/home.html">🏠 ホーム</a></li>
      <li><a href="/post-item.html">➕ 出品する</a></li>
      <li><a href="/my-exchanges.html">🔄 交換管理</a></li>
      <li><a href="/messages.html">💬 メッセージ</a></li>
      <li><a href="/notifications.html">🔔 通知</a></li>
      <li><a href="/profile.html">👤 プロフィール</a></li>
      <li><a href="#" onclick="logout()">🚪 ログアウト</a></li>
    </ul>
  </aside>

  <main class="home-main">
    <!-- 人気タグ -->
    <div class="popular-tags" id="popularTags">
      <span class="tag-label">人気タグ：</span>
      <span class="tag clickable" onclick="searchByTag('フォートナイト')">#フォートナイト</span>
      <span class="tag clickable" onclick="searchByTag('マインクラフト')">#マインクラフト</span>
      <span class="tag clickable" onclick="searchByTag('原神')">#原神</span>
      <span class="tag clickable" onclick="searchByTag('ポケモン')">#ポケモン</span>
      <span class="tag clickable" onclick="searchByTag('荒野行動')">#荒野行動</span>
    </div>

    <!-- 出品ボタン -->
    <div style="text-align:right;margin-bottom:16px">
      <button class="btn-sm btn-accent post-btn"
        onclick="location.href='/post-item.html'">➕ 出品する</button>
    </div>

    <!-- アイテム一覧 -->
    <div class="items-grid" id="itemsGrid">
      <div class="loading">読み込み中…</div>
    </div>

    <!-- ページネーション -->
    <div class="pagination" id="pagination"></div>
  </main>

  <script src="/js/auth.js"></script>
  <script src="/js/items.js"></script>
  <script>
    // 未ログインならトップへ（auth.jsで処理済みのため不要だが念のため）

    function searchByTag(tag) {
      document.getElementById('searchInput').value = '#' + tag;
      searchItems();
    }
  </script>
</body>
</html>
